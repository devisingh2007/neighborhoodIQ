events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  keepalive_timeout 65;
  gzip on;

  server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Serve index.html for root path
    location = / {
      try_files $uri /index.html;
    }

    # SPA routing - serve index.html for all routes not matching files/folders
    location / {
      try_files $uri $uri/ /index.html;
      # Cache busting for files with hash
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # Disable caching for index.html and service worker
    location ~* (index\.html|service-worker\.js)$ {
      expires -1;
      add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # API proxy (optional - if running frontend and backend separately)
    # Uncomment and configure if needed:
    # location /api/ {
    #   proxy_pass http://backend:5000/api/;
    #   proxy_http_version 1.1;
    #   proxy_set_header Upgrade $http_upgrade;
    #   proxy_set_header Connection 'upgrade';
    #   proxy_set_header Host $host;
    #   proxy_cache_bypass $http_upgrade;
    # }

    # Return 404 for specific files that shouldn't exist
    location ~ /\. {
      deny all;
    }
  }
}
